name: OWASP ZAP Full Scan

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: 
          - 'https://juice-shop.herokuapp.com'
          - 'http://testfire.net'
    name: ZAP Scan on ${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          format: openapi
          target: ${{ matrix.target }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -T 60'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ matrix.target }}
          path: ./zap_report.html

  aggregate_results:
    runs-on: ubuntu-latest
    needs: zap_scan
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge Reports
        run: |
          echo "Aggregating ZAP reports..."
          cat reports/*/*.html > combined_zap_report.html

      - name: Upload Combined Report
        uses: actions/upload-artifact@v4
        with:
          name: combined-zap-report
          path: combined_zap_report.html

  fail_on_alerts:
    runs-on: ubuntu-latest
    needs: aggregate_results
    steps:
      - name: Download Combined Report
        uses: actions/download-artifact@v4
        with:
          name: combined-zap-report
          path: .

      - name: Check for Critical Alerts
        run: |
          if grep -q "High" combined_zap_report.html; then
            echo "Critical alerts found!"
            exit 1
          else
            echo "No critical alerts detected."
          fi
